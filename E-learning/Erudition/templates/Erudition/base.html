<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Erudition{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'Erudition/css/style.css' %}">
    <style>
         /* ===== Animated hero banner (blue consultancy theme) ===== */
        .hero-section {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 6rem 0 6.5rem;
            isolation: isolate;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef4ff 100%);
            color: #1f2937;
        }
 
        /* drifting gradient orbs behind everything */
        .hero-section::before,
        .hero-section::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            z-index: -1;
        }
        .hero-section::before {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(59,130,246,0.30) 0%, rgba(59,130,246,0) 70%);
            top: -140px;
            left: -100px;
            animation: driftOne 16s ease-in-out infinite;
        }
        .hero-section::after {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(167,139,250,0.28) 0%, rgba(167,139,250,0) 70%);
            bottom: -160px;
            right: -80px;
            animation: driftTwo 18s ease-in-out infinite;
        }
 
        @keyframes driftOne {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.1); }
        }
        @keyframes driftTwo {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, -30px) scale(1.08); }
        }
 
        .hero-inner {
            position: relative;
            max-width: 560px;
            text-align: left;
        }
 
        .hero-flex {
            display: flex;
            align-items: center;
            gap: 3rem;
        }
 
        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59,130,246,0.1);
            color: #2563eb;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 999px;
            opacity: 0;
            animation: fadeUp 0.7s ease forwards;
        }
 
        .hero-title {
            font-size: 2.9rem;
            font-weight: 800;
            line-height: 1.15;
            color: #0f172a;
            margin: 1.25rem 0 1rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.15s forwards;
        }
 
        .hero-rotator {
            display: inline-block;
            position: relative;
            color: #3b82f6;
            height: 1.15em;
            overflow: hidden;
            vertical-align: bottom;
            min-width: 14ch;
            text-align: left;
        }
        .hero-rotator span {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            transform: translateY(100%);
            animation: rotateWord 10s infinite;
        }
        .hero-rotator span:nth-child(1) { animation-delay: 0s; }
        .hero-rotator span:nth-child(2) { animation-delay: 2s; }
        .hero-rotator span:nth-child(3) { animation-delay: 4s; }
        .hero-rotator span:nth-child(4) { animation-delay: 6s; }
        .hero-rotator span:nth-child(5) { animation-delay: 8s; }
 
        @keyframes rotateWord {
            0%, 2% { opacity: 0; transform: translateY(100%); }
            6%, 16% { opacity: 1; transform: translateY(0); }
            20%, 100% { opacity: 0; transform: translateY(-100%); }
        }
 
        .hero-subtext {
            color: #475569;
            font-size: 1.1rem;
            max-width: 520px;
            margin: 0 0 2rem;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.3s forwards;
        }
 
        .hero-actions {
            display: flex;
            justify-content: flex-start;
            gap: 14px;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.45s forwards;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        /* video-call illustration: a trainer speaking live with a learner on a laptop */
        .hero-illustration {
            position: relative;
            flex-shrink: 0;
            width: 340px;
        }
 
        .call-scene {
            position: relative;
            width: 340px;
            height: 300px;
        }
 
        .call-speaker {
            position: absolute;
            left: 6px;
            top: 14px;
            text-align: center;
        }
        .speaker-avatar {
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(160deg, #3b82f6 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem;
            color: #ffffff;
            box-shadow: 0 15px 30px rgba(59,130,246,0.35);
            z-index: 2;
            opacity: 0;
            animation: badgeIn 0.6s ease 0.3s forwards;
        }
        .speaker-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(59,130,246,0.5);
            animation: pulseRing 2.4s ease-out infinite;
        }
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.7); opacity: 0; }
        }
        .speaker-waves {
            display: flex;
            gap: 4px;
            justify-content: center;
            align-items: flex-end;
            height: 16px;
            margin-top: 10px;
            opacity: 0;
            animation: fadeUp 0.5s ease 1s forwards;
        }
        .speaker-waves span {
            width: 4px;
            background: #3b82f6;
            border-radius: 2px;
            animation: waveBar 1s ease-in-out infinite;
        }
        .speaker-waves span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .speaker-waves span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
        .speaker-waves span:nth-child(3) { height: 9px; animation-delay: 0.3s; }
        @keyframes waveBar {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.5); }
        }
 
        .call-connector {
            position: absolute;
            top: 54px;
            left: 100px;
            width: 130px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .call-connector .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            opacity: 0;
            animation: dotTravel 1.8s linear infinite;
        }
        .call-connector .dot:nth-child(1) { animation-delay: 0s; }
        .call-connector .dot:nth-child(2) { animation-delay: 0.3s; }
        .call-connector .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes dotTravel {
            0% { opacity: 0; transform: translateX(-10px); }
            30% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(10px); }
        }
 
        .call-laptop {
            position: absolute;
            right: 0;
            bottom: 30px;
            width: 220px;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.45s forwards;
        }
        .laptop-screen {
            position: relative;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
            border: 3px solid #cbd5e1;
            border-radius: 10px 10px 4px 4px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .laptop-avatar {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(59,130,246,0.18);
            border: 2px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #60a5fa;
            z-index: 2;
        }
        .live-ring {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(96,165,250,0.5);
            animation: pulseRing 2s ease-out infinite;
            animation-delay: 0.5s;
        }
        .live-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(59,130,246,0.9);
            color: #fff;
            font-size: 0.62rem;
            font-weight: 700;
            padding: 3px 9px 3px 7px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
        }
        .live-badge i { font-size: 0.5rem; color: #93f7c3; animation: blinkDot 1.4s ease-in-out infinite; }
        @keyframes blinkDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .laptop-base {
            height: 10px;
            background: #cbd5e1;
            border-radius: 0 0 8px 8px;
            margin: 0 -6px;
            box-shadow: 0 4px 10px rgba(15,23,42,0.15);
        }
 
        .chat-bubble {
            position: absolute;
            top: 0;
            right: 10px;
            background: #fff;
            border-radius: 14px 14px 14px 4px;
            padding: 8px 12px;
            display: flex;
            gap: 4px;
            box-shadow: 0 10px 20px rgba(15,23,42,0.18);
            opacity: 0;
            animation: badgeIn 0.5s ease 1.6s forwards;
        }
        .dot-typing {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3b82f6;
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .dot-typing:nth-child(2) { animation-delay: 0.15s; }
        .dot-typing:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
 
        @keyframes badgeIn {
            from { opacity: 0; transform: scale(0.4); }
            to { opacity: 1; transform: scale(1); }
        }
 
        @media (max-width: 767.98px) {
            .hero-section { padding: 3.5rem 0 4rem; }
            .hero-title { font-size: 2.1rem; }
            .hero-flex { flex-direction: column; }
            .hero-inner { text-align: center; max-width: 100%; }
            .hero-actions { justify-content: center; }
            .hero-illustration, .call-scene { width: 280px; margin: 1.5rem auto 0; }
            .call-laptop { width: 190px; }
        }
 
        @media (prefers-reduced-motion: reduce) {
            .hero-section::before,
            .hero-section::after,
            .hero-rotator span,
            .speaker-pulse,
            .speaker-waves span,
            .call-connector .dot,
            .live-ring,
            .live-badge i,
            .dot-typing {
                animation: none !important;
            }
            .hero-eyebrow, .hero-title, .hero-subtext, .hero-actions,
            .speaker-avatar, .speaker-waves, .call-laptop, .chat-bubble {
                opacity: 1;
                animation: none !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-3" href="{% url 'home' %}">
                <img src="{% static 'Erudition/LOGO.png' %}" alt="Erudition logo" class="logo-img">
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav align-items-lg-center ms-lg-3">
                    <li class="nav-item"><a class="nav-link active" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'courses' %}">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Live Classes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Articles</a></li>
                </ul>

                <form class="nav-search ms-lg-auto" role="search" onsubmit="return false;">
                    <i class="bi bi-search"></i>
                    <input type="search" placeholder="Search for courses, articles, skills...">
                </form>

                <div class="d-flex align-items-center nav-actions ms-lg-3">
                    <a href="#" class="nav-link-plain">Sign In</a>
                    <a href="#" class="btn-register">Register</a>
                </div>
            </div>
        </div>
    </nav>

    {% block header_banner %}{% endblock %}

    <main>
        {% block content %}<div class="hero-actions">
                        <a href="#" class="btn btn-primary-custom text-white px-4 py-2 rounded-pill">Explore Programs</a>
                        <a href="#" class="btn btn-outline-custom px-4 py-2 rounded-pill">About Us</a>
                    </div>
                </div>
 
                <div class="hero-illustration">
                    <div class="call-scene">
                        <div class="call-speaker">
                            <div class="speaker-avatar">
                                <i class="fa-solid fa-user-tie"></i>
                                <div class="speaker-pulse"></div>
                            </div>
                            <div class="speaker-waves"><span></span><span></span><span></span></div>
                        </div>
 
                        <div class="call-connector">
                            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        </div>
 
                        <div class="call-laptop">
                            <div class="laptop-screen">
                                <span class="live-badge"><i class="fa-solid fa-circle"></i> Live</span>
                                <div class="laptop-avatar">
                                    <i class="fa-solid fa-user-graduate"></i>
                                    <div class="live-ring"></div>
                                </div>
                            </div>
                            <div class="laptop-base"></div>
                        </div>
 
                        <div class="chat-bubble">
                            <span class="dot-typing"></span><span class="dot-typing"></span><span class="dot-typing"></span>
                        </div>
                    </div>
                </div>
            </div>{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
