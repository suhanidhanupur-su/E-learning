<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erudition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9ff 0%, #eef4ff 100%);
            color: #1f2937;
        }
       .navbar {
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
    min-height: 90px;
    padding: 8px 0;
}

.navbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 1.4rem;
    color: #3b82f6;
    text-decoration: none;
}

.navbar-brand img.logo-img {
    height: 70px;
    width: auto;
    max-width: none;
    object-fit: contain;
    display: block;

    /* Remove these */
    background: transparent;
    border-radius: 0;
    padding: 0;
}

@media (max-width: 575.98px) {
    .navbar {
        min-height: 75px;
    }

    .navbar-brand {
        font-size: 1.15rem;
        gap: 10px;
    }

    .navbar-brand img.logo-img {
        height: 55px;
        width: auto;
        max-width: none;
    }
}
        
        .nav-link {
            font-weight: 500;
            color: #334155;
        }
        .hero-section {
            width: 100%;
        }
        .hero-carousel .carousel-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .carousel-indicators {
            bottom: 1.25rem;
        }
        .carousel-indicators button {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.7);
            border: none;
            opacity: 0.7;
        }
        .carousel-indicators .active {
            opacity: 1;
            background-color: #ffffff;
        }
        .hero-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(15,23,42,0.12);
            padding: 2.5rem;
        }
        .btn-primary-custom {
            background-color: #3b82f6;
            border: none;
        }
        .btn-outline-custom {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .feature-icon {
            font-size: 1.6rem;
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'Erudition/images/logo.png' %}" alt="Erudition logo" class="logo-img">
                
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Category</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="#" class="text-dark"><i class="far fa-heart fa-lg"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero-section">
            <div id="heroCarousel" class="carousel slide carousel-fade hero-carousel" data-bs-ride="carousel" data-bs-interval="4500">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{% static 'Erudition/banner_1.png.png' %}" class="d-block w-100" alt="Erudition banner 1">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Erudition/banner_2.png.png' %}" class="d-block w-100" alt="Erudition banner 2">
                    </div>
                    <div class="carousel-item">
                        <img src="{% static 'Erudition/banner_3.png.png' %}" class="d-block w-100" alt="Erudition banner 3">
                    </div>
                </div>
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
